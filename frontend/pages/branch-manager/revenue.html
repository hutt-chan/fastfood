<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Báo cáo Doanh thu | Chi nhánh</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body class="dashboard">
  <div id="sidebar"></div>

  <main class="main-content">
    <h1>Báo cáo Doanh thu | Chi nhánh</h1>

    <div class="card" style="margin: 1rem 0; padding:1rem;">
      <h4>Chọn khoảng thời gian</h4>
      <form class="form-grid">
        <div class="form-group">
          <label class="form-label">Từ ngày</label>
          <input type="date" id="fromDate" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Đến ngày</label>
          <input type="date" id="toDate" class="form-control" />
        </div>
        <div class="form-group">
          <button id="btnLoad" class="btn btn-primary" type="button">Tải dữ liệu</button>
        </div>
      </form>
    </div>

    <div id="revenueTable" class="card" style="padding: 1rem;"></div>
  </main>

  <script type="module" src="../../assets/js/pages/branch-revenue.js"></script>
</body>
</html>
