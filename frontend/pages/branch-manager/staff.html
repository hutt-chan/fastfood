<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý Nhân viên | Chi nhánh</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body class="dashboard">
  <div id="sidebar"></div>
  <main class="main-content">
    <h1>Quản lý Nhân viên | Chi nhánh</h1>

    <div class="card" style="margin-top:1rem; padding:1rem;">
      <h4>Thêm nhân viên mới</h4>
      <form id="createStaffForm" class="form-grid">
        <div class="form-group">
          <label class="form-label">Họ tên</label>
          <input name="full_name" type="text" class="form-control" placeholder="Họ tên" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" placeholder="Email" required />
        </div>
        <div class="form-group">
          <label class="form-label">Số điện thoại</label>
          <input name="phone" type="text" class="form-control" placeholder="Số điện thoại" />
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input name="password" type="password" class="form-control" placeholder="Mật khẩu" required />
        </div>
        <div class="form-group">
          <label class="form-label">Vai trò</label>
          <select name="position" class="form-control" required>
            <option value="delivery">Giao hàng</option>
            <option value="kitchen">Nhân viên bếp</option>
            <option value="warehouse">Kho</option>
          </select>
        </div>
        <div class="form-group">
          <button class="btn btn-primary" type="submit">Thêm nhân viên</button>
        </div>
      </form>
    </div>

    <div id="staffList" class="card" style="margin-top:1rem; padding:1rem;"></div>
  </main>
  <script type="module" src="../../assets/js/pages/branch-staff.js"></script>
</body>
</html>
